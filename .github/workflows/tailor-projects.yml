name: Tailor repository projects

on:
  workflow_run:
    workflows:
      - Bootstrap repositories and projects
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview project customization without applying it"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: asr-project-tailoring
  cancel-in-progress: false

jobs:
  tailor:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out administration repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Tailor every repository project
        env:
          ASR_PROJECT_TOKEN: ${{ secrets.ASR_PROJECT_TOKEN }}
          ASR_ORG: Alpha-Stochastic-Research
          ASR_PROJECT_STYLE_CONFIG: config/project-styles.json
          ASR_DRY_RUN: >-
            ${{ github.event_name == 'workflow_dispatch' &&
                inputs.dry_run || false }}
        run: python scripts/tailor_projects.py
