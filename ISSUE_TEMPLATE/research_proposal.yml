name: Research Proposal
description: Propose a new research direction, paper reproduction, model, numerical experiment, or open-science project.
title: "[Research Proposal]: "
labels:
  - research
  - proposal
  - needs-review
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for proposing a research contribution to Alpha Stochastic Research.

        This template is intended for scientific proposals, including paper reproductions,
        mathematical models, numerical experiments, literature reviews, educational resources,
        datasets, or open-source research projects.

  - type: input
    id: repository
    attributes:
      label: Related Repository
      description: Which ASR repository is this proposal related to?
      placeholder: asr-theory-of-speculation
    validations:
      required: false

  - type: input
    id: title
    attributes:
      label: Research Proposal Title
      description: Provide a clear and concise title for the proposal.
      placeholder: Reproduction of Black-Scholes (1973)
    validations:
      required: true

  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal Type
      description: What kind of research contribution are you proposing?
      options:
        - Paper reproduction
        - Mathematical model
        - Numerical experiment
        - Literature review
        - Educational notebook
        - Dataset
        - Open-source implementation
        - Technical report
        - Benchmark study
        - Documentation project
        - Other
    validations:
      required: true

  - type: textarea
    id: abstract
    attributes:
      label: Abstract
      description: Summarize the proposal in a clear research-style abstract.
      placeholder: |
        This proposal aims to reproduce, analyze, and implement...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this proposal important for ASR or the quantitative finance community?
      placeholder: |
        Explain the scientific, educational, historical, or practical relevance of the proposal.
    validations:
      required: true

  - type: dropdown
    id: research_area
    attributes:
      label: Research Area
      description: Select the closest research area.
      options:
        - Quantitative Finance
        - Financial Mathematics
        - Stochastic Processes
        - Derivatives Pricing
        - Portfolio Optimization
        - Risk Management
        - Financial Econometrics
        - Time Series Analysis
        - Market Microstructure
        - Financial Machine Learning
        - Scientific Computing
        - Artificial Intelligence in Finance
        - Open Science
        - History of Finance
        - Other
    validations:
      required: true

  - type: textarea
    id: methodology
    attributes:
      label: Proposed Methodology
      description: Describe the mathematical, statistical, computational, or empirical methodology.
      placeholder: |
        Mathematical framework:
        Numerical methods:
        Data sources:
        Simulation approach:
        Validation strategy:
    validations:
      required: true

  - type: textarea
    id: expected_outputs
    attributes:
      label: Expected Outputs
      description: What should this research proposal produce?
      placeholder: |
        - Python implementation
        - Jupyter notebooks
        - Figures and simulations
        - Technical report
        - LaTeX manuscript
        - Documentation
        - Dataset
    validations:
      required: true

  - type: textarea
    id: reproducibility
    attributes:
      label: Reproducibility Plan
      description: Explain how the work will be made reproducible.
      placeholder: |
        Code:
        Data:
        Dependencies:
        Random seeds:
        Numerical validation:
        Documentation:
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add relevant papers, books, articles, datasets, or repositories.
      placeholder: |
        - Author, Title, Journal, Year
        - DOI / SSRN / arXiv / GitHub link
    validations:
      required: false

  - type: textarea
    id: risks_limitations
    attributes:
      label: Risks and Limitations
      description: Describe possible limitations, assumptions, or risks.
      placeholder: |
        Mathematical assumptions:
        Data limitations:
        Numerical stability:
        Computational complexity:
        Scope limitations:
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any diagrams, notes, related discussions, or extra context.
      placeholder: Add any additional information here.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions.
          required: true
        - label: The proposal is aligned with ASR's research mission.
          required: true
        - label: I have included sufficient scientific or technical context.
          required: true
        - label: I have considered reproducibility, documentation, and validation.
          required: true
